[project]
name = "pypepper"
version = "0.4.3"
authors = [
    { name = "jovijovi", email = "mageyul@hotmail.com" },
]
description = "PyPepper is a microservice toolkit written in Python."
readme = "README.md"
requires-python = ">=3.10"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "arrow==1.4.0",
    "cachetools==7.0.1",
    "cryptography==46.0.5",
    "fastapi==0.133.1",
    "uvicorn==0.41.0",
    "loguru==0.7.3",
    "mongoengine==0.29.1",
    "python-box==7.4.1",
    "pymysql==1.1.2",
    "psycopg[binary]==3.3.3",
    "pyyaml==6.0.3",
    "sqlalchemy==2.0.47",
    "pip==26.0.1",
]

[project.urls]
Homepage = "https://github.com/jovijovi/pypepper"
Repository = "https://github.com/jovijovi/pypepper"
Issues = "https://github.com/jovijovi/pypepper/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "build==1.4.0",
    "coverage==7.13.4",
    "packaging==26.0",
    "pip==26.0.1",
    "pytest==9.0.2",
    "pytest-asyncio==1.3.0",
    "pytest-cov==7.0.0",
    "twine==6.2.0",
]
