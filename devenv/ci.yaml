networks:
  devenv-network-pypepper:

services:
  mysql:
    container_name: devenv_mysql_pypepper
    image: mysql:8.0.45
    command: --default-authentication-plugin=mysql_native_password
    restart: 'no'
    environment:
      MYSQL_ROOT_PASSWORD: example
    volumes:
      - ../.data/mysql_data:/var/lib/mysql
      - ./init/mysql/schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./init/mysql/table.sql:/docker-entrypoint-initdb.d/2_table.sql
    ports:
      - "3306:3306"
    networks:
      - devenv-network-pypepper

  mongo:
    container_name: devenv_mongodb_pypepper
    image: mongo:8.0.19
    command: --auth
    restart: 'no'
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: test
    volumes:
      - ../.data/mongodb_data:/data/db
      - ./init/mongodb/user.js:/docker-entrypoint-initdb.d/1_user.js
    ports:
      - "27017:27017"
    networks:
      - devenv-network-pypepper

  postgres:
    container_name: devenv_postgres_pypepper
    image: postgres:18.2
    restart: 'no'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: mock_pypepper
    volumes:
      - ../.data/postgres_data:/var/lib/postgresql
      - ./init/postgres:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - devenv-network-pypepper
