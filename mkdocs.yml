site_name: PyPepper
site_description: A microservice toolkit written in Python
site_url: https://jovijovi.github.io/pypepper/
repo_url: https://github.com/jovijovi/pypepper
repo_name: jovijovi/pypepper

docs_dir: docs
site_dir: site

theme:
  name: material
  logo: logo/logo.svg
  favicon: logo/logo.svg
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Guides:
      - Common: guides/common.md
      - Event and FSM: guides/event-fsm.md
      - Scheduler: guides/scheduler.md
      - Network and SSE: guides/network-sse.md
      - Tracing: guides/tracing.md
      - DB Helper: guides/helper-db.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

plugins:
  - search
