# Cluster settings
cluster:
  name: cluster-name
  id: 5dd31f84-5df2-48c7-b84b-32d25b17a930
  description: 'cluster description'

# Network settings
network:
  ip: 0.0.0.0
  httpServer:
    enable: true
    port: 55550
  httpsServer:
    enable: false
    port: 55650
    mutualTLS: false

# Service info
serviceInfo:
  version: v1
  hostName: HostName
  serviceName: pypepper
  processName: pypepper
  ip: 127.0.0.1
  port: 55550
  tags:
    - microservice
    - python
    - docker
  id: 6b52f65f-34e5-42f3-9a71-283249571db3

# Log settings
log:
  level: TRACE
  colorize: True

# SSE (Server-Sent Events) settings
sse:
  enabled: true

  # Connection limits (for 100 concurrent users)
  maxTotalConnections: 100
  maxConnectionsPerIP: 5

  # Queue configuration
  maxQueueSize: 500

  # Timeout configuration
  streamTimeoutSeconds: 30
  heartbeatIntervalSeconds: 15

  # API Key authentication
  authentication:
    enabled: true
    # Valid API Keys (replace with your own keys)
    validKeys:
      - "dev-api-key-123"
      - "test-api-key-456"

  # Rate limiting
  rateLimit:
    enabled: true
    maxRequestsPerMinute: 60

# Custom config (Optional)
custom:
  foo: "Something interesting"
  bar:
    - 100
    - 200
